<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dff7ff"/>
      <stop offset="100%" stop-color="#79cfd6"/>
    </linearGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.15"/>
    </linearGradient>

    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="112" y="112" width="800" height="800" rx="140" fill="url(#bg)"/>

  <!-- House -->
  <g>
    <path d="M220 460 L512 240 L804 460" fill="none" stroke="white" stroke-opacity="0.4" stroke-width="28" stroke-linecap="round"/>
    <rect x="260" y="460" width="504" height="320" rx="40" fill="url(#glass)" stroke="white" stroke-opacity="0.25" stroke-width="6"/>
  </g>

  <!-- Eyes -->
  <g filter="url(#blur)">
    <rect x="380" y="560" width="110" height="110" rx="30" fill="#7dbbff" opacity="0.9"/>
    <rect x="534" y="560" width="110" height="110" rx="30" fill="#72e1cc" opacity="0.9"/>
  </g>

  <!-- Smile -->
  <path d="M430 700 Q512 770 594 700" stroke="white" stroke-opacity="0.7" stroke-width="20" fill="none" stroke-linecap="round"/>

</svg>
